upstream django_app {
    server unix:/ruta/a/tu/proyecto/safelab.sock;
}

server {
    listen 80;
    server_name tu_dominio.com ip_del_servidor;

    access_log /var/log/nginx/safelab_access.log;

    error_log /var/log/nginx/safelab_error.log;

    location /static/ {
        alias /ruta/a/tu/proyecto/staticfiles/;
    }

    location /static/admin/ {
        alias /ruta/a/tu/proyecto/staticfiles/admin/;
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://django_app;
    }

    error_page 500 502 503 504 404 /templates/error/500.html;
}   
