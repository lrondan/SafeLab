{% extends 'base.html' %}

{% block title %}Delete Reagent{% endblock %}

{% block content %}
<div class="container">
    <h2>Delete Reagent</h2>
    <p>Are you sure you want to delete the reagent "{{ reagent.common_name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'lab_detail' lab.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
