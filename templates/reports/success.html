<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Submitted</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-image: url("/static/img/crack.jpg");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      font-family: 'DM Sans', sans-serif;
      /* background: #f5f2ee; */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0dbd3;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,.06);
    }

    .check {
      width: 64px;
      height: 64px;
      background: #edf7f1;
      border: 1.5px solid #a8dbbe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
      animation: pop .4s ease;
    }

    @keyframes pop {
      0%   { transform: scale(.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: .5rem;
    }

    p {
      font-size: .92rem;
      color: #8a8278;
      line-height: 1.6;
    }

    .back-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: .75rem 2rem;
      background: #1a1814;
      color: #fff;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 600;
      border-radius: 8px;
      transition: opacity .15s;
    }

    .back-btn:hover { opacity: .8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Report submitted</h1>
    <p>Thanks for letting us know.<br>The lab instructor has been notified.</p>
    <a href="{% url 'reports:report' %}" class="back-btn">Submit another</a>
  </div>
</body>
</html>
